services:
  db:
    image: postgres:16-alpine
    container_name: pdhours-db
    environment:
      POSTGRES_DB: PDHours
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: P@ssw0rd
    ports:
      - "5432:5432"
    volumes:
      - pdhours_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d PDHours"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.0
    container_name: pdhours-mysql
    environment:
      MYSQL_DATABASE: PDHours
      MYSQL_ROOT_PASSWORD: P@ssw0rd
    ports:
      - "3306:3306"
    volumes:
      - pdhours_mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pP@ssw0rd"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    container_name: pdhours-api
    build:
      context: .
      dockerfile: dockerfile
    ports:
      - "5022:5022"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5022
      DatabaseProvider: ${DATABASE_PROVIDER:-PostgreSql}
      ConnectionStrings__PostgreSql: Host=db;Port=5432;Username=postgres;Password=P@ssw0rd;Database=PDHours
      ConnectionStrings__MySql: Server=mysql;Port=3306;Database=PDHours;User=root;Password=P@ssw0rd;
    depends_on:
      db:
        condition: service_healthy
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pdhours_pgdata:
  pdhours_mysqldata:
